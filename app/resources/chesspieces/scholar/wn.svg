<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
  <!-- Helm + visor; crest triangle shares the dome top so nothing “floats” above -->
  <g fill="#f6eee0" stroke="#1a342f" stroke-width="1.65" stroke-linejoin="round">
    <ellipse cx="22.5" cy="37.2" rx="11" ry="3.2"/>
    <!-- Taller arch (control y=6 → peak ~16.25) -->
    <path d="M 14 35.5 V 26.5 Q 22.5 6  31 26.5 V 35.5 Z"/>
    <path d="M 17 24 H 28" fill="none" stroke="#b86b35" stroke-width="1.55" stroke-linecap="round"/>
    <!-- Crest: filled triangle rooted on the dome crest (base ~y16.5 meets peak ~y16.25) -->
    <path d="M 19.2 16.4 L 22.5 7.5 L 25.8 16.4 Z"/>
  </g>
</svg>
