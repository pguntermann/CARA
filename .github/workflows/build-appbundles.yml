# Build Windows and macOS app bundles (manual trigger only).
# Outputs are uploaded as workflow artifacts only; no public release.

name: Build AppBundles

on:
  workflow_dispatch:
    inputs:
      use_config_version:
        description: 'Use version from config.json (if false, use timestamp)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: CARA_windows.spec
            platform: windows
            platform_display: windows
          - os: macos-latest
            spec: CARA_macos.spec
            platform: macos
            platform_display: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UPX (macOS)
        if: matrix.platform == 'macos'
        run: brew install upx

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.18.0

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }}

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event.inputs.use_config_version }}" = "true" ]; then
            VERSION=$(python -c "import json; print(json.load(open('app/config/config.json'))['version'])")
          else
            VERSION=$(date +%Y%m%d_%H%M%S)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: CARA.${{ steps.version.outputs.version }}.${{ matrix.platform_display }}.AppBundle
          path: dist/CARA

      - name: Create macOS ZIP
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          zipName="CARA.${version}.macOS.AppBundle.zip"
          # Use -y to store symlinks instead of following them; this keeps the ZIP
          # size aligned with the local PyInstaller bundle, which relies on symlinks
          # between Resources and Frameworks.
          (cd dist && zip -ry "../$zipName" CARA.app)
          echo "ZIP_NAME=$zipName" >> $GITHUB_ENV

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: CARA.${{ steps.version.outputs.version }}.${{ matrix.platform_display }}.AppBundle
          path: ${{ env.ZIP_NAME }}
