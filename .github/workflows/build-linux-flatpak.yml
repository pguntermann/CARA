name: Build Linux Flatpak

on:
  workflow_dispatch:
    inputs:
      use_config_version:
        description: "Use version from config.json (if false, use timestamp)"
        required: false
        default: false
        type: boolean

jobs:
  build-flatpak:
    name: Build Flatpak (${{ matrix.arch }})
    # aarch64 must run on ARM runners: x86_64 hosts cannot execute aarch64 SDK/bubblewrap
    # without full qemu+binfmt (Exec format error on /bin/sh). Matches build-linux-appbundles.yml.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python (for versioning step)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Flatpak build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            xvfb

      # User install: GitHub runners cannot deploy to the system Flatpak store without polkit/root.
      - name: Add Flathub remote (user)
        shell: bash
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event.inputs.use_config_version }}" = "true" ]; then
            VERSION=$(python -c "import json; print(json.load(open('app/config/config.json'))['version'])")
          else
            VERSION=$(date +%Y%m%d_%H%M%S)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update config.json version for timestamp builds
        if: github.event.inputs.use_config_version == 'false'
        shell: bash
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - << 'EOF'
          import json
          import os
          from pathlib import Path

          cfg_path = Path("app/config/config.json")
          data = json.loads(cfg_path.read_text(encoding="utf-8"))
          data["version"] = os.environ["BUILD_VERSION"]
          cfg_path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          EOF

      # flatpak-github-actions does not pass --user; without it, deps install fails on CI (system Deploy denied).
      - name: Build Flatpak
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          export GSETTINGS_BACKEND=memory
          # Skip appstream-compose (not available in bwrap); metainfo is installed as-is.
          MANIFEST=flatpak/io.github.pguntermann.CARA.yml
          APP_ID=$(grep -E '^app-id:' "$MANIFEST" | awk '{print $2}')
          BRANCH=master
          BUNDLE="CARA.${VERSION}.linux.${ARCH}.flatpak"
          SUBJECT="Built from ${GITHUB_SHA:-unknown}"
          xvfb-run --auto-servernum flatpak-builder \
            --user \
            --repo=repo \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --subject="$SUBJECT" \
            --force-clean \
            --default-branch="$BRANCH" \
            --arch="$ARCH" \
            --ccache \
            --no-appstream-compose \
            --state-dir .flatpak-builder \
            flatpak_app \
            "$MANIFEST"
          flatpak build-bundle \
            repo \
            "$BUNDLE" \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            --arch="$ARCH" \
            "$APP_ID" \
            "$BRANCH"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v6
        with:
          name: CARA.${{ steps.version.outputs.version }}.linux.${{ matrix.arch }}.flatpak
          path: CARA.${{ steps.version.outputs.version }}.linux.${{ matrix.arch }}.flatpak

