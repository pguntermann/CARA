app-id: io.github.pguntermann.CARA
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: cara

finish-args:
  # GUI
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  # Networking (e.g. engine downloads / online resources)
  - --share=network
  # "Behave like the tar" defaults: access user files without portal friction.
  - --filesystem=home
  # Allow opening files/URLs via portals where used.
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: cara
    buildsystem: simple
    # flatpak-builder build sandbox has no network unless granted (pip needs PyPI).
    build-options:
      build-args:
        - --share=network
    sources:
      - type: dir
        path: ..
    build-commands:
      # Pip falls back to user site when /usr is not writable; system python3 then
      # cannot find PyInstaller. Use a venv so pip, pyinstaller, and deps share one env.
      - |
        set -euo pipefail
        python3 -m venv .flatpak-venv
        . .flatpak-venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt -c .github/ci/linux-pip-constraints.txt
        pip install pyinstaller==6.17.0
        pyinstaller CARA_linux.spec
      - install -d /app/CARA
      - cp -a dist/CARA/. /app/CARA/
      - install -d /app/bin
      - install -Dm755 flatpak/cara.sh /app/bin/cara
      - install -Dm644 flatpak/io.github.pguntermann.CARA.desktop /app/share/applications/io.github.pguntermann.CARA.desktop
      # Do not install metainfo here: Ubuntu 22.04 flatpak-builder runs appstream-compose,
      # which is missing inside the build sandbox. flatpak/io.github.pguntermann.CARA.metainfo.xml
      # remains in-repo for Flathub / manual packaging with a newer builder.
      - install -Dm644 appicon.svg /app/share/icons/hicolor/scalable/apps/io.github.pguntermann.CARA.svg

